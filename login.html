<!DOCTYPE html>
<html>
<head>
<title>Admin Login - SSR Interiors Vizag</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#ff7a00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Enter Admin Password">

<button onclick="login()">Login</button>

<p id="error" style="color:red;"></p>

</div>
<script>
function login(){
var pass = document.getElementById("password").value;

if(pass === "admin123"){
localStorage.setItem("adminLogin","true");
window.location.href="admin.html";
}
else{
alert("Wrong Password");
}
}
</script>



</body>
</html>
