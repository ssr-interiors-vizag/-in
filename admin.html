<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSR Interiors Admin Panel</title>

<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SSR Admin</h2>
        <ul>
            <li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
            <li><a href="#" onclick="showSection('calculator')">Calculators</a></li>
            <li><a href="#" onclick="showSection('upload')">Upload Gallery</a></li>
            <li><a href="#" onclick="showSection('manage')">Manage Images</a></li>
            <li><a href="#" onclick="showSection('bookings')">Bookings</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- DASHBOARD -->
        <div id="dashboard" class="section">
            <h1>Dashboard</h1>
            <div class="card">
                <h2>Welcome Admin</h2>
                <p>SSR Interiors Control Panel</p>
            </div>
        </div>

        <!-- CALCULATOR -->
        <div id="calculator" class="section">
            <h1>Calculators</h1>
            <div class="card">
                <input type="number" id="paintArea" placeholder="Paint Area">
                <button onclick="calculatePaint()">Calculate Paint</button>
                <div id="paintResult"></div>
            </div>
        </div>

        <!-- UPLOAD -->
        <div id="upload" class="section">
            <h1>Upload</h1>
            <div class="card">
                <input type="file" id="imageInput">
                <select id="category">
                    <option value="kitchen">Kitchen</option>
                    <option value="bedroom">Bedroom</option>
                </select>
                <img id="preview">
                <button onclick="uploadImage()">Upload</button>
            </div>
        </div>

        <!-- MANAGE -->
        <div id="manage" class="section">
            <h1>Manage Images</h1>
            <div id="imageContainer" class="manage-grid"></div>
        </div>

        <!-- BOOKINGS -->
        <div id="bookings" class="section">
            <h1>Bookings</h1>
            <p>No bookings yet.</p>
        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

<script>
function showSection(id){
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.style.display = "none");

    document.getElementById(id).style.display = "block";
}

function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}
</script>

</body>
</html>
