<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSR Interiors Admin Panel</title>

<link rel="stylesheet" href="css/admin.css">

<style>

.section{
display:none;
}

#dashboard{
display:block;
}

#preview{
width:100%;
max-width:400px;
margin-top:15px;
border-radius:8px;
}

.manage-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.manage-grid img{
width:100%;
border-radius:8px;
}

.delete-btn{
margin-top:5px;
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:4px;
}

</style>

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>SSR Admin</h2>

<ul>

<li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
<li><a href="#" onclick="showSection('upload')">Upload Gallery</a></li>
<li><a href="#" onclick="showSection('manage')">Manage Images</a></li>
<li><a href="#" onclick="showSection('bookings')">Bookings</a></li>
<li><a href="#" onclick="showSection('logout')">Logout</a></li>

</ul>

</div>


<!-- Main Content -->

<div class="main-content">


<!-- Dashboard -->

<div id="dashboard" class="section">

<h1>Dashboard</h1>

<p>Welcome to SSR Interiors Admin Panel</p>

</div>


<!-- Upload Section -->

<div id="upload" class="section">

<div class="card">

<h2>Upload Gallery Image</h2>

<input type="file" id="imageInput">

<br><br>

<select id="category">

<option value="kitchen">Modular Kitchen</option>
<option value="bedroom">Bedroom</option>
<option value="living">Living Room</option>
<option value="wardrobe">Wardrobe</option>
<option value="ceiling">False Ceiling</option>
<option value="commercial">Commercial</option>

</select>

<br><br>

<img id="preview">

<br><br>

<button onclick="uploadImage()">Upload Image</button>

</div>

</div>


<!-- Manage Images -->

<div id="manage" class="section">

<h1>Manage Images</h1>

<div id="imageContainer" class="manage-grid"></div>

</div>


<!-- Bookings -->

<div id="bookings" class="section">

<h1>Bookings</h1>

<p>Customer booking requests will appear here.</p>

</div>


<!-- Logout -->

<div id="logout" class="section">

<h1>Logout</h1>

<p>You have logged out.</p>

</div>


</div>

</div>



<script>

/* Sidebar navigation */

function showSection(sectionId){

let sections=document.querySelectorAll(".section")

sections.forEach(section=>{
section.style.display="none"
})

document.getElementById(sectionId).style.display="block"

}


/* Image Preview */

const imageInput=document.getElementById("imageInput")
const preview=document.getElementById("preview")

imageInput.onchange=evt=>{

const[file]=imageInput.files

if(file){
preview.src=URL.createObjectURL(file)
}

}


/* Upload Image */

function uploadImage(){

const file=imageInput.files[0]
const category=document.getElementById("category").value

if(!file){
alert("Please select an image")
return
}

const formData=new FormData()

formData.append("file",file)
formData.append("upload_preset","ssr_gallery")

fetch("https://api.cloudinary.com/v1_1/depeb35y3/image/upload",{

method:"POST",
body:formData

})

.then(res=>res.json())
.then(data=>{

let images=JSON.parse(localStorage.getItem("galleryImages"))||[]

images.push({

src:data.secure_url,
category:category

})

localStorage.setItem("galleryImages",JSON.stringify(images))

alert("Image uploaded successfully")

loadImages()

})

}

/* Load Images */

function loadImages(){

const container=document.getElementById("imageContainer")

container.innerHTML=""

let images=JSON.parse(localStorage.getItem("galleryImages"))||[]

images.forEach((img,index)=>{

let div=document.createElement("div")

div.innerHTML=`
<img src="${img.src}">
<br>
<button class="delete-btn" onclick="deleteImage(${index})">Delete</button>
`

container.appendChild(div)

})

}


/* Delete Image */

function deleteImage(index){

let images=JSON.parse(localStorage.getItem("galleryImages"))

images.splice(index,1)

localStorage.setItem("galleryImages",JSON.stringify(images))

loadImages()

}


/* Load images on page start */

loadImages()

</script>

</body>

</html>
